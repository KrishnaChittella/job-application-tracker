# Run without PostgreSQL: mvn spring-boot:run -Dspring-boot.run.profiles=h2
spring:
  datasource:
    url: jdbc:h2:mem:jobtracker;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
